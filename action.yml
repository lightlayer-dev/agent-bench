name: "agent-bench"
description: "Score your website's AI agent-readiness in CI. Fail builds when scores drop below threshold."
author: "LightLayer"

branding:
  icon: "bar-chart-2"
  color: "blue"

inputs:
  urls:
    description: "Space-separated URLs to analyze"
    required: false
    default: ""
  config:
    description: "Path to agent-bench.yaml config file (alternative to urls)"
    required: false
    default: ""
  threshold:
    description: "Minimum score (0-100). Fails the step if any site scores below this."
    required: false
    default: ""
  format:
    description: "Output format: json, table, markdown, html"
    required: false
    default: "json"
  output-dir:
    description: "Directory for result files"
    required: false
    default: "agent-bench-results"
  post-url:
    description: "LightLayer Dashboard URL to POST results to"
    required: false
    default: ""
  api-key:
    description: "API key for dashboard posting"
    required: false
    default: ""
  version:
    description: "agent-bench version to install (default: latest)"
    required: false
    default: ""
  comment:
    description: "Post results as a PR comment (true/false)"
    required: false
    default: "true"

outputs:
  results-dir:
    description: "Path to the results directory"
    value: ${{ inputs.output-dir }}
  summary-json:
    description: "Path to the summary JSON file"
    value: ${{ inputs.output-dir }}/summary.json
  passed:
    description: "Whether all sites passed the threshold (true/false)"
    value: ${{ steps.run.outputs.passed }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install agent-bench
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "agent-bench==${{ inputs.version }}"
        else
          pip install agent-bench
        fi

    - name: Run analysis
      id: run
      shell: bash
      env:
        AGENT_BENCH_URLS: ${{ inputs.urls }}
        AGENT_BENCH_CONFIG: ${{ inputs.config }}
        AGENT_BENCH_THRESHOLD: ${{ inputs.threshold }}
        AGENT_BENCH_FORMAT: ${{ inputs.format }}
        AGENT_BENCH_OUTPUT_DIR: ${{ inputs.output-dir }}
        AGENT_BENCH_POST_URL: ${{ inputs.post-url }}
        AGENT_BENCH_API_KEY: ${{ inputs.api-key }}
      run: |
        set +e

        ARGS="--output-dir $AGENT_BENCH_OUTPUT_DIR --format $AGENT_BENCH_FORMAT --quiet"

        if [ -n "$AGENT_BENCH_THRESHOLD" ]; then
          ARGS="$ARGS --threshold $AGENT_BENCH_THRESHOLD"
        fi

        if [ -n "$AGENT_BENCH_POST_URL" ]; then
          ARGS="$ARGS --post $AGENT_BENCH_POST_URL --source ci"
        fi

        if [ -n "$AGENT_BENCH_CONFIG" ]; then
          ARGS="$ARGS --config $AGENT_BENCH_CONFIG"
        fi

        # Run the batch command
        agent-bench batch $AGENT_BENCH_URLS $ARGS
        EXIT_CODE=$?

        if [ $EXIT_CODE -eq 0 ]; then
          echo "passed=true" >> $GITHUB_OUTPUT
        else
          echo "passed=false" >> $GITHUB_OUTPUT
        fi

        # Generate step summary
        if [ -f "$AGENT_BENCH_OUTPUT_DIR/summary.json" ]; then
          echo "## 🤖 Agent-Readiness Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 -c "
        import json, sys
        data = json.load(open('$AGENT_BENCH_OUTPUT_DIR/summary.json'))
        threshold = '$AGENT_BENCH_THRESHOLD'
        print('| Site | Score | Status |')
        print('|------|-------|--------|')
        for r in data:
            url = r.get('url', 'unknown')
            score = r.get('overall_score', 0)
            if threshold and float(score) < float(threshold):
                status = '❌ FAIL'
            else:
                status = '✅ PASS'
            print(f'| {url} | {score}/100 | {status} |')
        " >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Powered by [agent-bench](https://github.com/lightlayer-dev/agent-bench)_" >> $GITHUB_STEP_SUMMARY
        fi

        exit $EXIT_CODE

    - name: Comment on PR
      if: inputs.comment == 'true' && github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = '${{ inputs.output-dir }}/summary.json';
          if (!fs.existsSync(path)) return;

          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          const threshold = '${{ inputs.threshold }}';

          let body = '## 🤖 Agent-Readiness Report\n\n';
          body += '| Site | Score | Status |\n';
          body += '|------|-------|--------|\n';

          for (const r of data) {
            const url = r.url || 'unknown';
            const score = r.overall_score || 0;
            const status = threshold && score < parseFloat(threshold) ? '❌ FAIL' : '✅ PASS';
            body += `| ${url} | ${score}/100 | ${status} |\n`;
          }

          body += '\n<details><summary>Check details</summary>\n\n';
          for (const r of data) {
            body += `### ${r.url || 'unknown'} — ${r.overall_score || 0}/100\n\n`;
            const checks = r.checks || r.check_scores || {};
            for (const [name, info] of Object.entries(checks)) {
              const s = typeof info === 'object' ? (info.score ?? info) : info;
              body += `- **${name}**: ${s}\n`;
            }
            body += '\n';
          }
          body += '</details>\n\n_Powered by [agent-bench](https://github.com/lightlayer-dev/agent-bench)_';

          // Find existing comment to update
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.data.find(c =>
            c.user.type === 'Bot' && c.body.includes('Agent-Readiness Report')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: agent-bench-results
        path: ${{ inputs.output-dir }}/
        retention-days: 30
