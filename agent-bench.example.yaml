# agent-bench configuration
# Copy to agent-bench.yaml and fill in your details.

models:
  - name: claude-sonnet
    provider: anthropic
    model_id: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.0
    max_tokens: 4096

  - name: gpt-4o
    provider: openai
    model_id: gpt-4o
    api_key_env: OPENAI_API_KEY

  - name: gemini-pro
    provider: google
    model_id: gemini-2.5-pro
    api_key_env: GOOGLE_API_KEY

adapters:
  - type: browser-use
    headless: true
    timeout_seconds: 120
    max_steps: 50

  - type: playwright
    headless: true
    timeout_seconds: 90
    max_steps: 30

default_timeout: 120
